<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV Maker - Create Your Perfect Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
            height: calc(100vh - 200px);
            min-height: 700px;
        }

        /* Form Section */
        .form-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #333;
            font-size: 1.3em;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section-title i {
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Dynamic Sections */
        .dynamic-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-header h4 {
            color: #333;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.2s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
        }

        .btn-remove {
            background: #ff4757;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .btn-remove:hover {
            transform: scale(1.1);
        }

        .item-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .item-card .btn-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 25px;
            height: 25px;
            font-size: 12px;
        }

        /* Preview Section */
        .preview-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            position: relative;
        }

        .preview-actions {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px 0 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            z-index: 10;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        /* Template Styles */
        .template-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .template-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .template-option:hover {
            background: white;
            border-color: #667eea;
        }

        .template-option.active {
            background: white;
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .template-option i {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 5px;
        }

        .template-option span {
            display: block;
            font-size: 13px;
            color: #333;
        }

        /* CV Preview */
        .cv-preview {
            font-family: 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* Template 1 - Modern */
        .template-modern {
            padding: 40px;
        }

        .template-modern .header-section {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }

        .template-modern .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .template-modern .name-title h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 5px;
        }

        .template-modern .name-title h3 {
            color: #667eea;
            font-weight: 400;
        }

        .template-modern .contact-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .template-modern .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #555;
        }

        .template-modern .contact-item i {
            color: #667eea;
            width: 20px;
        }

        .template-modern .grid-2 {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        /* Template 2 - Classic */
        .template-classic {
            padding: 40px;
            background: white;
        }

        .template-classic .header-section {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #333;
        }

        .template-classic .name-title h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 10px;
        }

        .template-classic .name-title h3 {
            color: #666;
            font-weight: 400;
            font-size: 18px;
        }

        .template-classic .contact-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .template-classic .contact-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #555;
        }

        /* Template 3 - Minimal */
        .template-minimal {
            padding: 40px;
            background: white;
        }

        .template-minimal .header-section {
            margin-bottom: 30px;
        }

        .template-minimal .name-title h1 {
            font-size: 42px;
            color: #333;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .template-minimal .name-title h3 {
            color: #999;
            font-weight: 300;
            font-size: 18px;
        }

        .template-minimal .contact-info {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        /* Common styles for all templates */
        .section {
            margin-bottom: 25px;
        }

        .section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section h2 i {
            color: #667eea;
        }

        .job-item,
        .education-item {
            margin-bottom: 20px;
        }

        .job-header,
        .education-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .job-title,
        .degree-title {
            font-weight: 600;
            color: #333;
        }

        .company,
        .institution {
            color: #667eea;
            font-weight: 500;
        }

        .date {
            color: #999;
            font-size: 14px;
        }

        .description {
            color: #666;
            line-height: 1.6;
            margin-top: 5px;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
                height: auto;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-file-alt"></i> Professional CV Maker</h1>
            <p>Create a stunning resume in minutes with our easy-to-use CV builder</p>
        </div>

        <div class="main-content">
            <!-- Form Section -->
            <div class="form-section">
                <div class="section-title">
                    <i class="fas fa-edit"></i>
                    <h2>Personal Information</h2>
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <div>
                            <label>Full Name</label>
                            <input type="text" id="fullName" placeholder="John Doe" value="John Doe">
                        </div>
                        <div>
                            <label>Professional Title</label>
                            <input type="text" id="title" placeholder="Software Engineer" value="Software Engineer">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <div>
                            <label>Email</label>
                            <input type="email" id="email" placeholder="john@example.com" value="john.doe@email.com">
                        </div>
                        <div>
                            <label>Phone</label>
                            <input type="tel" id="phone" placeholder="+1 234 567 890" value="+1 234 567 890">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <div>
                            <label>Location</label>
                            <input type="text" id="location" placeholder="City, Country" value="New York, NY">
                        </div>
                        <div>
                            <label>Website/LinkedIn</label>
                            <input type="text" id="website" placeholder="linkedin.com/in/johndoe"
                                value="linkedin.com/in/johndoe">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Professional Summary</label>
                    <textarea id="summary" rows="3"
                        placeholder="Brief overview of your professional background...">Experienced software engineer with 5+ years in full-stack development. Passionate about creating efficient, scalable applications and solving complex problems. Strong track record of delivering high-quality projects on time.</textarea>
                </div>

                <!-- Work Experience Section -->
                <div class="dynamic-section">
                    <div class="section-header">
                        <h4><i class="fas fa-briefcase"></i> Work Experience</h4>
                        <button class="btn-add" onclick="addWorkExperience()">
                            <i class="fas fa-plus"></i> Add Experience
                        </button>
                    </div>
                    <div id="work-experience-container">
                        <!-- Work experience items will be added here -->
                    </div>
                </div>

                <!-- Education Section -->
                <div class="dynamic-section">
                    <div class="section-header">
                        <h4><i class="fas fa-graduation-cap"></i> Education</h4>
                        <button class="btn-add" onclick="addEducation()">
                            <i class="fas fa-plus"></i> Add Education
                        </button>
                    </div>
                    <div id="education-container">
                        <!-- Education items will be added here -->
                    </div>
                </div>

                <!-- Skills Section -->
                <div class="dynamic-section">
                    <div class="section-header">
                        <h4><i class="fas fa-code"></i> Skills</h4>
                        <button class="btn-add" onclick="addSkill()">
                            <i class="fas fa-plus"></i> Add Skill
                        </button>
                    </div>
                    <div id="skills-container">
                        <!-- Skills will be added here -->
                    </div>
                </div>

                <!-- Languages Section -->
                <div class="dynamic-section">
                    <div class="section-header">
                        <h4><i class="fas fa-language"></i> Languages</h4>
                        <button class="btn-add" onclick="addLanguage()">
                            <i class="fas fa-plus"></i> Add Language
                        </button>
                    </div>
                    <div id="languages-container">
                        <!-- Languages will be added here -->
                    </div>
                </div>
            </div>

            <!-- Preview Section -->
            <div class="preview-section">
                <div class="preview-actions">
                    <div class="template-selector">
                        <div class="template-option active" onclick="changeTemplate('modern')">
                            <i class="fas fa-layer-group"></i>
                            <span>Modern</span>
                        </div>
                        <div class="template-option" onclick="changeTemplate('classic')">
                            <i class="fas fa-scroll"></i>
                            <span>Classic</span>
                        </div>
                        <div class="template-option" onclick="changeTemplate('minimal')">
                            <i class="fas fa-minus-circle"></i>
                            <span>Minimal</span>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="downloadPDF()">
                        <i class="fas fa-download"></i> Download PDF
                    </button>
                    <button class="btn btn-secondary" onclick="printCV()">
                        <i class="fas fa-print"></i> Print
                    </button>
                </div>

                <div id="cv-preview" class="cv-preview template-modern">
                    <!-- CV preview will be dynamically generated here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let workExperiences = [];
        let educations = [];
        let skills = [];
        let languages = [];
        let currentTemplate = 'modern';

        // Initialize with sample data
        function initializeSampleData() {
            workExperiences = [
                {
                    jobTitle: 'Senior Software Engineer',
                    company: 'Tech Solutions Inc.',
                    startDate: '2021',
                    endDate: 'Present',
                    description: 'Lead development of cloud-based applications, mentor junior developers, implement best practices.'
                },
                {
                    jobTitle: 'Software Developer',
                    company: 'Digital Innovations',
                    startDate: '2018',
                    endDate: '2021',
                    description: 'Developed and maintained web applications, collaborated with cross-functional teams.'
                }
            ];

            educations = [
                {
                    degree: 'Master of Computer Science',
                    institution: 'Stanford University',
                    startDate: '2016',
                    endDate: '2018',
                    description: 'Specialized in Artificial Intelligence and Machine Learning'
                },
                {
                    degree: 'Bachelor of Science in Computer Science',
                    institution: 'University of California',
                    startDate: '2012',
                    endDate: '2016',
                    description: 'Graduated with Honors'
                }
            ];

            skills = ['JavaScript', 'Python', 'React', 'Node.js', 'SQL', 'AWS'];
            languages = ['English (Native)', 'Spanish (Fluent)', 'French (Intermediate)'];

            renderAll();
        }

        // Render functions
        function renderWorkExperience() {
            const container = document.getElementById('work-experience-container');
            container.innerHTML = '';

            workExperiences.forEach((exp, index) => {
                const item = document.createElement('div');
                item.className = 'item-card';
                item.innerHTML = `
                    <button class="btn-remove" onclick="removeWorkExperience(${index})">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="form-group">
                        <input type="text" placeholder="Job Title" value="${exp.jobTitle}" onchange="updateWorkExperience(${index}, 'jobTitle', this.value)">
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Company" value="${exp.company}" onchange="updateWorkExperience(${index}, 'company', this.value)">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" placeholder="Start Date" value="${exp.startDate}" onchange="updateWorkExperience(${index}, 'startDate', this.value)">
                        </div>
                        <div class="form-group">
                            <input type="text" placeholder="End Date" value="${exp.endDate}" onchange="updateWorkExperience(${index}, 'endDate', this.value)">
                        </div>
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Description" rows="2" onchange="updateWorkExperience(${index}, 'description', this.value)">${exp.description}</textarea>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function renderEducation() {
            const container = document.getElementById('education-container');
            container.innerHTML = '';

            educations.forEach((edu, index) => {
                const item = document.createElement('div');
                item.className = 'item-card';
                item.innerHTML = `
                    <button class="btn-remove" onclick="removeEducation(${index})">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="form-group">
                        <input type="text" placeholder="Degree" value="${edu.degree}" onchange="updateEducation(${index}, 'degree', this.value)">
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Institution" value="${edu.institution}" onchange="updateEducation(${index}, 'institution', this.value)">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" placeholder="Start Date" value="${edu.startDate}" onchange="updateEducation(${index}, 'startDate', this.value)">
                        </div>
                        <div class="form-group">
                            <input type="text" placeholder="End Date" value="${edu.endDate}" onchange="updateEducation(${index}, 'endDate', this.value)">
                        </div>
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Description" rows="2" onchange="updateEducation(${index}, 'description', this.value)">${edu.description}</textarea>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function renderSkills() {
            const container = document.getElementById('skills-container');
            container.innerHTML = '';

            skills.forEach((skill, index) => {
                const item = document.createElement('div');
                item.className = 'item-card';
                item.innerHTML = `
                    <button class="btn-remove" onclick="removeSkill(${index})">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="form-group">
                        <input type="text" placeholder="Skill" value="${skill}" onchange="updateSkill(${index}, this.value)">
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function renderLanguages() {
            const container = document.getElementById('languages-container');
            container.innerHTML = '';

            languages.forEach((language, index) => {
                const item = document.createElement('div');
                item.className = 'item-card';
                item.innerHTML = `
                    <button class="btn-remove" onclick="removeLanguage(${index})">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="form-group">
                        <input type="text" placeholder="Language" value="${language}" onchange="updateLanguage(${index}, this.value)">
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function renderCVPreview() {
            const preview = document.getElementById('cv-preview');
            const fullName = document.getElementById('fullName').value;
            const title = document.getElementById('title').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const location = document.getElementById('location').value;
            const website = document.getElementById('website').value;
            const summary = document.getElementById('summary').value;

            let html = '';

            if (currentTemplate === 'modern') {
                html = generateModernTemplate(fullName, title, email, phone, location, website, summary);
            } else if (currentTemplate === 'classic') {
                html = generateClassicTemplate(fullName, title, email, phone, location, website, summary);
            } else if (currentTemplate === 'minimal') {
                html = generateMinimalTemplate(fullName, title, email, phone, location, website, summary);
            }

            preview.innerHTML = html;
            preview.className = `cv-preview template-${currentTemplate}`;
        }

        function generateModernTemplate(fullName, title, email, phone, location, website, summary) {
            return `
                <div class="template-modern">
                    <div class="header-section">
                        <div class="profile-img">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="name-title">
                            <h1>${fullName}</h1>
                            <h3>${title}</h3>
                        </div>
                    </div>

                    <div class="contact-info">
                        <div class="contact-item">
                            <i class="fas fa-envelope"></i>
                            <span>${email}</span>
                        </div>
                        <div class="contact-item">
                            <i class="fas fa-phone"></i>
                            <span>${phone}</span>
                        </div>
                        <div class="contact-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>${location}</span>
                        </div>
                        <div class="contact-item">
                            <i class="fas fa-globe"></i>
                            <span>${website}</span>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="left-column">
                            <div class="section">
                                <h2><i class="fas fa-user-circle"></i> Profile</h2>
                                <p class="description">${summary}</p>
                            </div>

                            <div class="section">
                                <h2><i class="fas fa-code"></i> Skills</h2>
                                <div class="skills-list">
                                    ${skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                                </div>
                            </div>

                            <div class="section">
                                <h2><i class="fas fa-language"></i> Languages</h2>
                                <div class="skills-list">
                                    ${languages.map(lang => `<span class="skill-tag">${lang}</span>`).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="right-column">
                            <div class="section">
                                <h2><i class="fas fa-briefcase"></i> Work Experience</h2>
                                ${workExperiences.map(exp => `
                                    <div class="job-item">
                                        <div class="job-header">
