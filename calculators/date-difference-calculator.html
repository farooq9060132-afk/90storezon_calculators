<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>📅 Date Difference Calculator · 8 modes · business days · age</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --secondary: #7c3aed;
            --success: #059669;
            --warning: #d97706;
            --error: #dc2626;
            --bg-light: #f9fafb;
            --bg-dark: #111827;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --calendar-highlight: #dbeafe;
            --weekend-bg: #fef3c7;
            --holiday-bg: #fecaca;
            --today-bg: #86efac;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --radius: 12px;
            --radius-sm: 8px;
            --space-mob: 16px;
            --space-tab: 24px;
            --space-desk: 32px;
            --font-base: 16px;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #eef2f6;
            color: var(--text-primary);
            line-height: 1.5;
            padding: var(--space-mob);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* main card */
        .calculator-app {
            max-width: 1920px;
            width: 100%;
            background: white;
            border-radius: calc(var(--radius) * 1.5);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* header */
        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: clamp(16px, 4vw, 32px);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .app-header h1 {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-header p {
            font-size: 1rem;
            opacity: 0.9;
            margin-left: auto;
        }

        /* tab navigation */
        .mode-tabs {
            display: flex;
            flex-wrap: wrap;
            background: white;
            border-bottom: 2px solid var(--border);
            padding: 8px 12px 0;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            padding: 12px 18px;
            font-size: 0.9rem;
            font-weight: 500;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.1s;
            touch-action: manipulation;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: var(--calendar-highlight);
        }

        @media (max-width: 480px) {
            .tab-btn {
                padding: 12px 10px;
                font-size: 0.8rem;
            }
        }

        /* main 2-col layout (desktop) */
        .main-panel {
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 1024px) {
            .main-panel {
                flex-direction: row;
            }

            .input-col {
                width: 40%;
                border-right: 1px solid var(--border);
            }

            .result-col {
                width: 60%;
            }
        }

        /* cards & sections */
        .input-col,
        .result-col {
            padding: clamp(16px, 3vw, 32px);
        }

        .card {
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: clamp(16px, 3vw, 24px);
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        .date-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .date-input-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .date-input-group label {
            min-width: 100px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .date-field {
            display: flex;
            flex: 2 1 260px;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px 10px;
        }

        .date-field input {
            border: none;
            padding: 12px 0;
            font-size: 1rem;
            width: 100%;
            min-width: 140px;
            outline: none;
            background: transparent;
        }

        .date-field button {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 6px;
        }

        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .quick-btns button,
        .btn-sm {
            background: white;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.1s;
            touch-action: manipulation;
            min-height: 44px;
        }

        .quick-btns button:active {
            background: var(--calendar-highlight);
        }

        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px 0;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 16px -6px var(--primary);
            transition: 0.15s;
            min-height: 56px;
        }

        .btn-secondary {
            background: white;
            border: 1px solid var(--border);
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }

        /* result display */
        .result-badge {
            background: white;
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            border-left: 8px solid var(--primary);
            box-shadow: var(--card-shadow);
        }

        .primary-diff {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .stat-box {
            background: white;
            padding: 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .timeline-visual {
            background: var(--border);
            height: 24px;
            border-radius: 40px;
            margin: 16px 0;
            position: relative;
            overflow: hidden;
        }

        .timeline-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            width: 0%;
            border-radius: 40px;
        }

        .footer-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        /* mobile collapsible */
        @media (max-width: 767px) {
            .result-col .card:not(.always-open) {
                margin-bottom: 12px;
            }

            .result-col details {
                background: var(--bg-light);
                border-radius: var(--radius);
                border: 1px solid var(--border);
                padding: 8px 12px;
                margin-bottom: 12px;
            }

            .result-col summary {
                font-weight: 600;
                padding: 12px 0;
                cursor: pointer;
                list-style: none;
                display: flex;
                justify-content: space-between;
            }
        }

        /* mini calendar mock */
        .mini-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            background: white;
            padding: 16px;
            border-radius: var(--radius);
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border-radius: 30px;
            background: var(--bg-light);
        }

        .cal-day.today {
            background: var(--today-bg);
            font-weight: 700;
        }

        /* hover effects (desktop) */
        @media (min-width: 1024px) {
            .btn-primary:hover {
                background: #1d4ed8;
                transform: scale(1.02);
            }

            .tab-btn:hover {
                background: #eef2ff;
                color: var(--primary);
            }
        }

        /* utility */
        .swap-btn {
            font-size: 1.2rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 14px 20px;
        }

        .text-secondary {
            color: var(--text-secondary);
        }

        .mt-4 {
            margin-top: 16px;
        }
    </style>
</head>

<body>
    <div class="calculator-app">
        <header class="app-header">
            <h1>📅 Date Difference Calculator</h1>
            <p>8 modes · business days · age · timeline</p>
        </header>

        <!-- mode tabs (8 modes) -->
        <div class="mode-tabs" id="modeTabs">
            <button class="tab-btn active" data-mode="diff">1️⃣ Difference</button>
            <button class="tab-btn" data-mode="addsub">2️⃣ Add/Subtract</button>
            <button class="tab-btn" data-mode="biz">3️⃣ Business</button>
            <button class="tab-btn" data-mode="age">4️⃣ Age</button>
            <button class="tab-btn" data-mode="weekno">5️⃣ Week#</button>
            <button class="tab-btn" data-mode="duration">6️⃣ Duration</button>
            <button class="tab-btn" data-mode="until">7️⃣ Until/Since</button>
            <button class="tab-btn" data-mode="compare">8️⃣ Compare</button>
        </div>

        <!-- main area (dynamic content filled via js) -->
        <div class="main-panel" id="mainPanel">
            <!-- injected by javascript -->
        </div>

        <!-- history / footer -->
        <div style="padding: 0 32px 24px 32px; border-top: 1px solid var(--border); background: white;">
            <details>
                <summary style="font-weight:600; padding:16px 0; cursor:pointer;">📋 Recent calculations (click to
                    expand)</summary>
                <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                    <span>20 Jan 2025 → 2 Mar 2026: 1y 1m 10d</span>
                    <span>🎂 15 Jan 2000 → today: 26y 1m 15d</span>
                    <span>📅 Week 9, 2026</span>
                </div>
            </details>
            <div
                style="display:flex; gap:16px; justify-content:center; padding:16px 0; color:var(--text-secondary); font-size:0.9rem;">
                <a href="#" style="text-decoration:none;">❓ FAQ</a> <span>|</span>
                <a href="#" style="text-decoration:none;">📖 Examples</a> <span>|</span>
                <a href="#" style="text-decoration:none;">⚖️ About</a>
            </div>
        </div>
    </div>

    <script>
        (function () {
            // today references
            const today = new Date();
            const todayStr = today.toISOString().slice(0, 10).replace(/-/g, '/'); // yyyy/mm/dd for input

            // helper: format yyyy-mm-dd
            function formatDateInput(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            // main render function based on active mode
            function renderMode(mode) {
                const panel = document.getElementById('mainPanel');
                let html = '';

                // common input column start
                if (mode === 'diff') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3 style="margin-bottom:20px;">📆 Calculate Date Difference</h3>
                        <div class="date-row">
                            <div class="date-input-group"><label>From (start):</label>
                                <div class="date-field"><input type="date" id="startDate" value="2020-01-15"><button>📅</button></div>
                            </div>
                            <div class="date-input-group"><label>To (end):</label>
                                <div class="date-field"><input type="date" id="endDate" value="2026-03-02"><button>📅</button></div>
                            </div>
                        </div>
                        <div class="quick-btns">
                            <button>Today</button><button>Yesterday</button><button>1 week ago</button><button>1 month ago</button>
                        </div>
                        <div class="options-grid">
                            <label class="checkbox-item"><input type="checkbox" checked> Include end date</label>
                            <label class="checkbox-item"><input type="checkbox"> Exclude weekends</label>
                            <label class="checkbox-item"><input type="checkbox"> Exclude holidays</label>
                        </div>
                        <div style="display:flex; gap:12px; flex-wrap:wrap;">
                            <button class="btn-primary" id="calcDiff">Calculate Difference</button>
                            <button class="btn-secondary">Clear</button>
                            <button class="swap-btn" title="swap dates">⇄</button>
                        </div>
                    </div>
                </div>
                <div class="result-col">
                    <div class="result-badge">
                        <div class="text-secondary">From 15 Jan 2020 (Wed) → 2 Mar 2026 (Mon)</div>
                        <div class="primary-diff">6 Years, 1 Month, 15 Days</div>
                    </div>
                    <div class="card always-open">
                        <h4>📊 Detailed breakdown</h4>
                        <div class="detail-grid">
                            <div class="stat-box"><span class="stat-value">73</span> months</div>
                            <div class="stat-box"><span class="stat-value">317</span> weeks</div>
                            <div class="stat-box"><span class="stat-value">2,238</span> days</div>
                            <div class="stat-box"><span class="stat-value">53,712</span> hours</div>
                        </div>
                        <h4 style="margin-top:20px;">💼 Business days</h4>
                        <div class="detail-grid">
                            <div class="stat-box">Working: 1,599</div><div class="stat-box">Weekends: 639</div><div class="stat-box">Holidays: 15</div>
                        </div>
                        <div class="timeline-visual"><div class="timeline-fill" style="width:100%"></div></div>
                        <div style="display:flex; justify-content:space-between"><span>Jan 2020</span><span>Mar 2026</span></div>
                        <div class="footer-actions">
                            <button>📤 Share</button><button>🖨️ Print</button><button>📋 Copy</button>
                        </div>
                    </div>
                </div>
                `;
                }
                else if (mode === 'addsub') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3>➕➖ Add / Subtract days</h3>
                        <div class="date-row"><div class="date-field"><input type="date" value="2026-03-02"></div></div>
                        <div class="quick-btns"><button>Today</button><button>Yesterday</button></div>
                        <div style="display:flex; gap:20px; margin:16px 0"><label><input type="radio" name="op" checked> Add</label> <label><input type="radio" name="op"> Subtract</label></div>
                        <div class="date-input-group"><label>Years:</label> <input type="number" value="0" min="0" style="width:80px;"> <label>Months:</label> <input type="number" value="1" style="width:80px;"> <label>Days:</label> <input type="number" value="15" style="width:80px;"></div>
                        <div class="quick-btns"><button>+7 days</button><button>+30 days</button><button>+1 year</button></div>
                        <label class="checkbox-item"><input type="checkbox"> Skip weekends</label>
                        <button class="btn-primary" style="margin-top:24px;">Calculate</button>
                    </div>
                </div>
                <div class="result-col">
                    <div class="card">
                        <div class="primary-diff" style="font-size:2rem;">Result: 17 Mar 2026</div>
                        <div class="stat-box">Day: Tuesday · Week 12 · +15 days</div>
                    </div>
                </div>
                `;
                }
                else if (mode === 'biz') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3>💼 Business Days</h3>
                        <div><label>From: <input type="date" value="2026-01-01"></label></div>
                        <div><label>To: <input type="date" value="2026-12-31"></label></div>
                        <div style="margin:16px 0">Working days: 
                            <label><input type="checkbox" checked> Mon</label> <label><input type="checkbox" checked> Tue</label> <label><input type="checkbox" checked> Wed</label>
                            <label><input type="checkbox" checked> Thu</label> <label><input type="checkbox" checked> Fri</label> <label><input type="checkbox"> Sat</label> <label><input type="checkbox"> Sun</label>
                        </div>
                        <label>Country: <select><option>USA</option><option>UK</option></select></label>
                        <button class="btn-primary">Calculate business days</button>
                    </div>
                </div>
                <div class="result-col">
                    <div class="card"><span class="stat-value">261</span> business days · 104 weekends · 10 holidays</div>
                </div>
                `;
                }
                else if (mode === 'age') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3>🎂 Age Calculator</h3>
                        <div><label>Birth: <input type="date" value="2000-01-15"></label></div>
                        <div><label>As of: <input type="date" value="${formatDateInput(today)}"></label></div>
                        <button class="btn-primary">Calculate age</button>
                    </div>
                </div>
                <div class="result-col">
                    <div class="result-badge">
                        <div class="primary-diff">25 Years, 1 Month, 15 Days</div>
                        <div>Born on Thursday, 15 Jan 2000 · Zodiac: Capricorn ♑</div>
                        <div>Next birthday: 15 Jan 2027 (in 10 months)</div>
                    </div>
                </div>
                `;
                }
                else if (mode === 'weekno') {
                    html = `
                <div class="input-col"><div class="card"><h3>📆 Week Number</h3><input type="date" value="2026-03-02"><br><select><option>ISO 8601</option></select><button class="btn-primary">Get week</button></div></div>
                <div class="result-col"><div class="card"><span class="stat-value">Week 9 (2026)</span> · 2 Mar – 8 Mar · 17.3% of year</div></div>
                `;
                }
                else if (mode === 'duration') {
                    html = `
                <div class="input-col"><div class="card"><h3>⏱️ Duration with time</h3><input type="datetime-local" value="2026-03-02T08:30"><br><input type="datetime-local" value="2026-03-04T23:05"><br><button class="btn-primary">Calculate</button></div></div>
                <div class="result-col"><div class="card"><span class="stat-value">2d 14h 35m</span> · 62.59h · 225,320 sec</div></div>
                `;
                }
                else if (mode === 'until') {
                    html = `
                <div class="input-col"><div class="card"><h3>🎯 Days until event</h3><input type="date" value="2026-12-25"><input placeholder="Event name" value="Christmas"><br><div class="quick-btns"><button>Christmas</button><button>New Year</button></div><button class="btn-primary">Countdown</button></div></div>
                <div class="result-col"><div class="card"><span class="stat-value">298 days until Christmas</span> (42 weeks) · working days: 213</div></div>
                `;
                }
                else if (mode === 'compare') {
                    html = `
                <div class="input-col"><div class="card"><h3>📊 Compare multiple</h3><input type="date" value="2020-01-15"><br><input type="date" value="2024-06-01"><br><input type="date" value="2026-03-02"><br><button class="btn-primary">Compare</button></div></div>
                <div class="result-col"><div class="card">Earliest: 15 Jan 2020 · Latest: 2 Mar 2026 · Span: 6y 1m 15d</div></div>
                `;
                }

                panel.innerHTML = html;
            }

            // init + tab switching
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const mode = tab.dataset.mode;
                    renderMode(mode);
                });
            });

            // default render diff
            renderMode('diff');

            // attach some listeners (swap, calc etc) - simple demo
            document.addEventListener('click', (e) => {
                if (e.target.closest('.swap-btn')) {
                    const start = document.getElementById('startDate');
                    const end = document.getElementById('endDate');
                    if (start && end) {
                        const tmp = start.value;
                        start.value = end.value;
                        end.value = tmp;
                    }
                }
                if (e.target.closest('#calcDiff')) {
                    alert('Calculation demo: 6y 1m 15d (real calculation would update)');
                }
            });
        })();
    </script>

    <!-- ensure responsive touch adjustments -->
    <style>
        @media (max-width: 480px) {
            .date-field input {
                font-size: 16px;
            }

            /* prevent zoom */
            .btn-primary,
            .btn-secondary,
            .quick-btns button {
                min-height: 48px;
            }

            .result-badge {
                padding: 16px;
            }

            .primary-diff {
                word-break: break-word;
            }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            .main-panel {
                flex-direction: column;
            }

            .input-col,
            .result-col {
                width: 100%;
            }

            .detail-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .input-col {
                border-right: 2px solid var(--border);
            }
        }

        /* hide default number spinner */
        input[type=number]::-webkit-inner-spin-button {
            opacity: 0.5;
        }

        summary {
            list-style: none;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .date-field button {
            font-size: 1.4rem;
            line-height: 1;
        }
    </style>
</body>

</html>
