<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>🔢 Percentage Calculator · 8 modes · visual & step by step</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #3b82f6;
            --primary-light: #93c5fd;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-light: #f8fafc;
            --bg-dark: #1e293b;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --accent: #f59e0b;
            --radius: 12px;
            --radius-sm: 8px;
            --space-mob: 16px;
            --space-tab: 24px;
            --space-desk: 32px;
            --shadow: 0 20px 25px -5px rgba(0 0 0 / 0.05), 0 8px 10px -6px rgba(0 0 0 / 0.02);
        }

        body {
            background: #eef2f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--space-mob);
        }

        .calculator-app {
            max-width: 1600px;
            width: 100%;
            background: white;
            border-radius: calc(var(--radius) * 1.5);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* header */
        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: clamp(16px, 4vw, 32px);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .app-header h1 {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-header p {
            font-size: 1.1rem;
            opacity: 0.95;
            margin-left: auto;
        }

        /* tabs (swipeable on mobile) */
        .mode-tabs {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: thin;
            gap: 4px;
            background: white;
            border-bottom: 2px solid var(--border);
            padding: 8px 12px 0;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }

        .mode-tabs .tab-btn {
            flex: 0 0 auto;
            scroll-snap-align: start;
            padding: 12px 18px;
            font-weight: 600;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.1s;
            min-height: 48px;
            font-size: 0.95rem;
        }

        .mode-tabs .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: #eff6ff;
        }

        @media (max-width: 480px) {
            .mode-tabs .tab-btn {
                padding: 12px 10px;
                font-size: 0.85rem;
            }
        }

        /* main 2-col layout (desktop) */
        .main-panel {
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 1024px) {
            .main-panel {
                flex-direction: row;
            }

            .input-col {
                width: 45%;
                border-right: 2px solid var(--border);
            }

            .result-col {
                width: 55%;
            }
        }

        .input-col,
        .result-col {
            padding: clamp(16px, 3vw, 32px);
        }

        .card {
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: clamp(20px, 4vw, 28px);
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .input-field {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px 12px;
        }

        .input-field input {
            border: none;
            outline: none;
            width: 100%;
            padding: 14px 0;
            font-size: 1rem;
            background: transparent;
        }

        .input-field span.currency {
            font-weight: 600;
            color: var(--text-secondary);
            margin-right: 6px;
        }

        .input-field span.percent {
            color: var(--text-secondary);
            font-weight: 600;
            margin-left: 4px;
        }

        .radio-group {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .quick-btns button {
            background: white;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 12px 20px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.1s;
            min-height: 48px;
            font-size: 0.95rem;
        }

        .quick-btns button:active {
            background: var(--primary-light);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 16px -6px var(--primary);
            transition: 0.15s;
            min-height: 56px;
        }

        .btn-secondary {
            background: white;
            border: 1px solid var(--border);
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }

        .result-badge {
            background: linear-gradient(145deg, #ffffff, #f9fafc);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            border-left: 8px solid var(--primary);
            box-shadow: var(--shadow);
        }

        .result-number {
            font-size: clamp(2.5rem, 7vw, 4rem);
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
        }

        .visual-bar {
            background: var(--border);
            height: 24px;
            border-radius: 40px;
            margin: 20px 0 10px;
            overflow: hidden;
        }

        .visual-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            width: 0%;
            border-radius: 40px;
        }

        .step-box {
            background: white;
            border-radius: var(--radius-sm);
            padding: 16px;
            border: 1px dashed var(--border);
            margin: 16px 0;
            font-size: 0.95rem;
        }

        .footer-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        /* history */
        .history-panel {
            border-top: 2px solid var(--border);
            padding: 20px 32px;
            background: #fcfcfd;
        }

        .history-items {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 12px;
            color: var(--text-secondary);
        }

        .history-items span {
            background: white;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        @media (max-width: 767px) {
            .result-col details {
                background: var(--bg-light);
                border-radius: var(--radius);
                border: 1px solid var(--border);
                padding: 12px;
                margin-bottom: 16px;
            }

            .result-col summary {
                font-weight: 600;
                padding: 12px 0;
                cursor: pointer;
            }

            .footer-actions {
                justify-content: center;
            }
        }

        /* tablet adaptive */
        @media (min-width: 768px) and (max-width: 1023px) {
            .main-panel {
                flex-direction: column;
            }

            .input-col,
            .result-col {
                width: 100%;
            }
        }

        /* hover for desktop */
        @media (min-width: 1024px) {
            .btn-primary:hover {
                background: #2563eb;
                transform: scale(1.02);
            }

            .quick-btns button:hover {
                background: #e6f0ff;
            }
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="calculator-app">
        <header class="app-header">
            <h1>🔢 Percentage Calculator</h1>
            <p>8 modes · visual · step-by-step</p>
        </header>

        <!-- tab navigation (8 modes) -->
        <div class="mode-tabs" id="modeTabs">
            <button class="tab-btn active" data-mode="basic">1️⃣ Basic</button>
            <button class="tab-btn" data-mode="diff">2️⃣ % Diff</button>
            <button class="tab-btn" data-mode="incdec">3️⃣ Inc/Dec</button>
            <button class="tab-btn" data-mode="reverse">4️⃣ Reverse</button>
            <button class="tab-btn" data-mode="whatpercent">5️⃣ What %</button>
            <button class="tab-btn" data-mode="discount">6️⃣ Discount</button>
            <button class="tab-btn" data-mode="tip">7️⃣ Tip</button>
            <button class="tab-btn" data-mode="grade">8️⃣ Grade</button>
        </div>

        <!-- main panel (injected by JS) -->
        <div class="main-panel" id="mainPanel"></div>

        <!-- history panel (collapsible) -->
        <div class="history-panel">
            <details open>
                <summary style="font-weight:600; font-size:1.1rem; cursor:pointer;">📋 History (last 5)</summary>
                <div class="history-items" id="historyContainer">
                    <span>20% of 500 = 100</span>
                    <span>200→250 = +25%</span>
                    <span>Tip: $100 + 15% = $115</span>
                    <span>75 is 25% of 300</span>
                    <span>85% grade A</span>
                </div>
                <button class="btn-secondary" style="margin-top:12px; padding:8px 16px;">Clear history</button>
            </details>
        </div>

        <!-- simple footer -->
        <div
            style="padding: 16px 32px; border-top:1px solid var(--border); display:flex; gap:20px; flex-wrap:wrap; justify-content:center; background:white;">
            <a href="#" style="color: var(--primary);">📘 How to use</a> <span>|</span>
            <a href="#" style="color: var(--primary);">💡 Examples</a> <span>|</span>
            <a href="#" style="color: var(--primary);">❓ FAQ</a>
        </div>
    </div>

    <script>
        (function () {
            // ---------- helper functions ----------
            function round(value, decimals = 2) {
                return Math.round(value * Math.pow(10, decimals)) / Math.pow(10, decimals);
            }

            // ---------- render each mode ----------
            function renderMode(mode) {
                const panel = document.getElementById('mainPanel');
                let html = '';

                if (mode === 'basic') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3 style="margin-bottom:20px;">🔢 What is [__]% of [__]?</h3>
                        <div class="input-group">
                            <label>Percentage (%)</label>
                            <div class="input-field"><input type="number" id="pct1" value="20" step="any" min="0"><span class="percent">%</span></div>
                        </div>
                        <div class="input-group">
                            <label>Number</label>
                            <div class="input-field"><input type="number" id="num1" value="500" step="any" min="0"></div>
                        </div>
                        <div class="quick-btns">
                            <button data-quick="10">10%</button><button data-quick="15">15%</button><button data-quick="20">20%</button><button data-quick="25">25%</button><button data-quick="50">50%</button><button data-quick="75">75%</button>
                        </div>
                        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:24px;">
                            <button class="btn-primary" id="calcBasic">Calculate</button>
                            <button class="btn-secondary">Clear</button>
                        </div>
                    </div>
                </div>
                <div class="result-col">
                    <div class="result-badge" id="resultBasic">
                        <div class="text-secondary">20% of 500</div>
                        <div class="result-number">100</div>
                        <div class="visual-bar"><div class="visual-fill" style="width:20%"></div></div>
                        <div class="step-box">
                            <strong>🔢 Formula:</strong> 500 × (20 ÷ 100) = 100<br>
                            <strong>📘 Step-by-step:</strong> 20% = 0.20 → 500 × 0.20 = 100
                        </div>
                        <div class="footer-actions">
                            <button>📤 Share</button><button>📋 Copy</button><button>🖨️ Print</button>
                        </div>
                    </div>
                </div>
                `;
                }
                else if (mode === 'diff') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3>📊 Percentage change from → to</h3>
                        <div class="input-group"><label>From value:</label><div class="input-field"><input type="number" id="fromVal" value="200" step="any"></div></div>
                        <div class="input-group"><label>To value:</label><div class="input-field"><input type="number" id="toVal" value="250" step="any"></div></div>
                        <button class="btn-primary" id="calcDiff">Calculate change</button>
                    </div>
                </div>
                <div class="result-col">
                    <div class="result-badge">
                        <div class="result-number" style="color: var(--success);">+25% ▲</div>
                        <div>Difference: 50 • Formula: ((250-200)/200)×100</div>
                        <div class="visual-bar"><div class="visual-fill" style="width:100%"></div></div>
                    </div>
                </div>
                `;
                }
                else if (mode === 'incdec') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3>Increase / decrease by %</h3>
                        <div class="input-group"><label>Original:</label><div class="input-field"><input type="number" value="500" step="any"></div></div>
                        <div class="input-group"><label>Percent:</label><div class="input-field"><input type="number" value="15" step="any"><span class="percent">%</span></div></div>
                        <div class="radio-group"><label><input type="radio" name="incdec" checked> Increase</label> <label><input type="radio" name="incdec"> Decrease</label></div>
                        <button class="btn-primary">Calculate</button>
                    </div>
                </div>
                <div class="result-col">
                    <div class="result-badge">
                        <div class="result-number">575</div>
                        <div>Change amount: +75 • Final: 575</div>
                    </div>
                </div>
                `;
                }
                else if (mode === 'reverse') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3>🔁 [value] is [%] of what?</h3>
                        <div class="input-group"><label>Value (part):</label><div class="input-field"><input type="number" value="75"></div></div>
                        <div class="input-group"><label>Percentage:</label><div class="input-field"><input type="number" value="25" step="any"><span class="percent">%</span></div></div>
                        <button class="btn-primary">Find whole</button>
                    </div>
                </div>
                <div class="result-col">
                    <div class="result-badge">
                        <div class="result-number">300</div>
                        <div>75 ÷ (25÷100) = 300</div>
                    </div>
                </div>
                `;
                }
                else if (mode === 'whatpercent') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3>❓ X is what % of Y?</h3>
                        <div class="input-group"><label>X (part):</label><div class="input-field"><input type="number" value="30"></div></div>
                        <div class="input-group"><label>Y (whole):</label><div class="input-field"><input type="number" value="150"></div></div>
                        <button class="btn-primary">Calculate %</button>
                    </div>
                </div>
                <div class="result-col">
                    <div class="result-badge">
                        <div class="result-number">20%</div>
                        <div> (30 ÷ 150) × 100 = 20%</div>
                    </div>
                </div>
                `;
                }
                else if (mode === 'discount') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3>💰 Discount + tax</h3>
                        <div class="input-group"><label>Original price ($):</label><div class="input-field"><span class="currency">$</span><input type="number" value="200"></div></div>
                        <div class="input-group"><label>Discount %:</label><div class="input-field"><input type="number" value="25" step="any"><span class="percent">%</span></div></div>
                        <div class="input-group"><label>Tax % (opt):</label><div class="input-field"><input type="number" value="10" step="any"><span class="percent">%</span></div></div>
                        <button class="btn-primary">Calculate</button>
                    </div>
                </div>
                <div class="result-col">
                    <div class="result-badge">
                        <div>Discount: $50 • After disc: $150 • Tax: $15</div>
                        <div class="result-number">$165 final</div>
                        <div>You save $50 (25%)</div>
                    </div>
                </div>
                `;
                }
                else if (mode === 'tip') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3>🍽️ Tip split</h3>
                        <div class="input-group"><label>Bill ($):</label><div class="input-field"><span class="currency">$</span><input type="number" value="100" step="any"></div></div>
                        <div class="input-group"><label>Tip %:</label><div class="input-field"><input type="number" value="18" step="any"><span class="percent">%</span></div></div>
                        <div class="input-group"><label>Split (# people):</label><div class="input-field"><input type="number" value="4" min="1"></div></div>
                        <div class="quick-btns"><button>10%</button><button>15%</button><button>18%</button><button>20%</button></div>
                        <button class="btn-primary">Calculate</button>
                    </div>
                </div>
                <div class="result-col">
                    <div class="result-badge">
                        <div>Tip: $18 • Total: $118</div>
                        <div class="result-number">$29.50 / person</div>
                    </div>
                </div>
                `;
                }
                else if (mode === 'grade') {
                    html = `
                <div class="input-col">
                    <div class="card">
                        <h3>📝 Score % & grade</h3>
                        <div class="input-group"><label>Obtained:</label><div class="input-field"><input type="number" value="85"></div></div>
                        <div class="input-group"><label>Total marks:</label><div class="input-field"><input type="number" value="100"></div></div>
                        <button class="btn-primary">Calculate grade</button>
                    </div>
                </div>
                <div class="result-col">
                    <div class="result-badge">
                        <div class="result-number">85% (A)</div>
                        <div>Status: ✅ Pass</div>
                        <div class="visual-bar"><div class="visual-fill" style="width:85%"></div></div>
                        <div>Grade scale: A=90-100, B=80-89 ...</div>
                    </div>
                </div>
                `;
                }

                panel.innerHTML = html;
                attachModeListeners(mode);
            }

            // attach listeners for each mode (example calc)
            function attachModeListeners(mode) {
                if (mode === 'basic') {
                    const btn = document.getElementById('calcBasic');
                    if (btn) {
                        btn.addEventListener('click', function (e) {
                            const pct = parseFloat(document.getElementById('pct1')?.value) || 0;
                            const num = parseFloat(document.getElementById('num1')?.value) || 0;
                            const result = round(num * pct / 100);
                            const resultDiv = document.querySelector('#resultBasic .result-number');
                            if (resultDiv) resultDiv.innerText = result;
                            const fill = document.querySelector('#resultBasic .visual-fill');
                            if (fill) fill.style.width = Math.min(pct, 100) + '%';
                            // update history (push new)
                            const hist = document.getElementById('historyContainer');
                            if (hist) {
                                const newSpan = document.createElement('span');
                                newSpan.innerText = `${pct}% of ${num} = ${result}`;
                                hist.prepend(newSpan);
                                if (hist.children.length > 5) hist.removeChild(hist.lastChild);
                            }
                        });
                    }
                    // quick buttons
                    document.querySelectorAll('[data-quick]').forEach(b => {
                        b.addEventListener('click', (e) => {
                            const val = e.target.innerText.replace('%', '');
                            const pctInput = document.getElementById('pct1');
                            if (pctInput) pctInput.value = val;
                        });
                    });
                }
            }

            // initial render and tab switching
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderMode(tab.dataset.mode);
                });
            });

            // default mode
            renderMode('basic');

            // history clear button
            document.addEventListener('click', (e) => {
                if (e.target.innerText.includes('Clear history')) {
                    const hist = document.getElementById('historyContainer');
                    if (hist) hist.innerHTML = ''; // empty
                }
                if (e.target.innerText === '📋 Copy') {
                    const resultNum = document.querySelector('.result-number')?.innerText;
                    if (resultNum) {
                        navigator.clipboard?.writeText(resultNum).then(() => alert('Copied!'));
                    }
                }
            });

        })();
    </script>

    <!-- small improvements -->
    <style>
        input[type=number] {
            -moz-appearance: textfield;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            opacity: 0.6;
        }

        .tab-btn.active {
            font-weight: 700;
        }

        .history-items span {
            cursor: pointer;
        }

        .history-items span:hover {
            background: var(--primary-light);
        }

        .footer-actions button {
            background: white;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</body>

</html>
